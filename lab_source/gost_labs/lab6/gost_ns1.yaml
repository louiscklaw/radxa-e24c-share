services:
  - name: service-0
    addr: 10.0.20.3:12345
    handler:
      type: red
      chain: chain-0
      metadata:
        sniffing: true
    listener:
      type: red

chains:
  - name: chain-0
    hops:
      - name: hop-0
        nodes:
          - name: node-0
            addr: 10.0.10.1:8080
            # node level sockopts, will override hop level value.
            sockopts:
              mark: 100
            connector:
              type: http
            dialer:
              type: tcp
