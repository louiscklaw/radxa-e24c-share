# GitHub domains (required for Antigravity extensions)
ipset=/github.com/antigravity_proxy
ipset=/githubusercontent.com/antigravity_proxy

# Microsoft domains (VS Code core components)
ipset=/aka.ms/antigravity_proxy
ipset=/visualstudio.com/antigravity_proxy
ipset=/vscode.download.prss.microsoft.com/antigravity_proxy
ipset=/vscode-cdn.net/antigravity_proxy
ipset=/vsassets.io/antigravity_proxy

# Google Antigravity domains
ipset=/antigravity.com/antigravity_proxy
ipset=/antigravity.google/antigravity_proxy
ipset=/run.app/antigravity_proxy

# Google API domains (critical for Antigravity features)
ipset=/googleapis.com/antigravity_proxy
ipset=/play.googleapis.com/antigravity_proxy

# Add any additional domains you discover
# ipset=/yourdomain.com/antigravity_proxy
