# Listen on localhost only
listen-address=127.0.0.1

# Use Google DNS as upstream (or use your own preferred DNS)
server=8.8.8.8
server=8.8.4.4

# Don't read /etc/resolv.conf for upstream servers
no-resolv

# Cache size (helps with performance)
cache-size=1000

# Include custom domain configurations
conf-dir=/etc/dnsmasq.d/,*.conf

